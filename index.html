<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>04/19 クッション値×含水率</title>
<style>
:root {
  --bg: #0f172a; --bg-card: #1e293b; --border: #334155;
  --text: #f1f5f9; --text-sub: #94a3b8; --text-muted: #64748b;
  --accent: #f59e0b; --blue: #38bdf8;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif;
  background: var(--bg); color: var(--text); padding: 14px;
  -webkit-font-smoothing: antialiased;
}
.page-header { margin-bottom: 16px; }
.page-header h1 { font-size: 20px; font-weight: 900; }
.page-header .sub { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
.venue-block { margin-bottom: 16px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
.venue-head {
  padding: 12px 14px; background: var(--bg-card);
  display: flex; justify-content: space-between; align-items: center;
}
.venue-head h2 { font-size: 16px; font-weight: 900; }
.venue-cv {
  display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px;
}
.cv-badge {
  font-size: 10px; font-weight: 700; font-family: monospace;
  background: var(--bg); border: 1px solid var(--border);
  padding: 2px 7px; border-radius: 5px; color: var(--text-sub);
}
.cv-badge b { color: var(--accent); }
.cv-badge.moist b { color: var(--blue); }
.race-list a {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 14px; border-top: 1px solid var(--border);
  background: #111827; color: var(--text); text-decoration: none;
  font-size: 14px; font-weight: 700;
  transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.race-list a:active { background: #1e293b; }
.race-list a .meta { font-size: 10px; color: var(--text-muted); font-weight: 600; margin-left: 8px; }
.race-list a .arrow { color: var(--text-muted); font-size: 14px; }
.page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.page-header-text h1 { font-size: 20px; font-weight: 900; }
.page-header-text .sub { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
.admin-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: #1e293b; border: 1px solid #334155; color: #94a3b8;
  text-decoration: none; padding: 8px 14px; border-radius: 10px;
  font-size: 12px; font-weight: 800; white-space: nowrap; flex-shrink: 0;
}
.admin-btn:hover { border-color: var(--accent); color: var(--accent); }
.admin-dot { width: 7px; height: 7px; border-radius: 50%; background: #475569; }
</style>
</head>
<body>
<div class="page-header">
  <div class="page-header-text">
    <h1>04/19 競馬　クッション値×含水率</h1>
    <div class="sub">散布図一覧 — タップで各レースの散布図を表示</div>
  </div>
  <a href="http://localhost:5001/" target="_blank" class="admin-btn">
    <span class="admin-dot"></span>管理ページ
  </a>
</div>
</body></html>
